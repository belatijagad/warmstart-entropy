# config.yaml

data:
  train_files: "data/dapo-math/train.parquet"
  val_files: "data/math/test.parquet"
  prompt_key: "prompt"
  truncation: "left"
  max_prompt_length: 2048
  max_response_length: 8192
  train_batch_size: 16

algorithm:
  adv_estimator: "grpo"
  use_kl_in_reward: false
  kl_ctrl:
    kl_coef: 0.0

actor_rollout_ref:
  model:
    path: "belati/Qwen2.5-3B-Instruct_multireasoner_sft-full_merged"
    use_remove_padding: true
    enable_gradient_checkpointing: true
    lora_rank: 32
    lora_alpha: 32
    target_modules: "all-linear"
    override_config:
      max_position_embeddings: 32768
  actor:
    strategy: "fsdp2"
    use_kl_loss: false
    kl_loss_coef: 0.0
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    clip_ratio_c: 10.0
    use_dynamic_bsz: true
    ppo_max_token_len_per_gpu: 32768 
    ppo_mini_batch_size: 16
    entropy_coeff: 0
    grad_clip: 1.0
    loss_agg_mode: "token-mean"
    ulysses_sequence_parallel_size: 1
    fsdp_config:
      param_offload: true
      optimizer_offload: true
      fsdp_size: -1
  ref:
    log_prob_use_dynamic_bsz: true
    log_prob_max_token_len_per_gpu: 40960 
    ulysses_sequence_parallel_size: 1
    fsdp_config:
      param_offload: true
  rollout:
    name: "vllm"
    n: 8 
    log_prob_use_dynamic_bsz: true
    log_prob_max_token_len_per_gpu: 40960
    gpu_memory_utilization: 0.85 
    tensor_model_parallel_size: 1
    enable_chunked_prefill: true
    max_num_batched_tokens: 16384 
    temperature: 1.0
    top_p: 1.0
    top_k: -1
    val_kwargs:
      temperature: 1.0
      top_p: 0.7
      top_k: -1
      do_sample: true
      n: 1

reward_model:
  reward_manager: "dapo"
  reward_kwargs:
    max_resp_len: 8192
    overlong_buffer_cfg:
      enable: true
      len: 2048
      penalty_factor: 1.0
      log: false

trainer:
  logger: ["console", "wandb"]
  project_name: "multireasoner-verl"
  experiment_name: "DAPO-Qwen2.5-3B-Instruct-LoRA-full"
  n_gpus_per_node: 1
  nnodes: 1
  val_before_train: true
  test_freq: 10
  save_freq: 80
  total_epochs: 10
  total_training_steps: 200
  default_local_dir: "./ckpts/multireasoner-verl/DAPO-Qwen2.5-3B-Instruct-LoRA-full"
  resume_mode: "auto"
  log_val_generations: 10